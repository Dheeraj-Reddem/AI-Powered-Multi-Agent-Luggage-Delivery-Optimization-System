services:
  api:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

    networks:
      - appnet

  worker:
    build: .
    env_file: .env
    command: celery -A app.worker.celery worker --loglevel=INFO --concurrency=2
    depends_on:
      - redis
      - postgres
    networks:
      - appnet

  postgres:
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d luggage_db" ]
      interval: 2s
      timeout: 5s
      retries: 30
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: luggage_db
    ports:
      - "5432:5432"
    networks:
      - appnet

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    networks:
      - appnet

networks:
  appnet:
    driver: bridge
